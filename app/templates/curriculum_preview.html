<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Curriculum Preview</title>
    <style>
        .preview-controls {
            padding: 16px;
            background: #ffffff;
            display: flex;
            gap: 12px;
            border-bottom: 1px solid #e5e7eb;
            justify-content: center;
        }
        .btn {
            padding: 8px 16px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .btn-primary { 
            background: #000000; 
            color: #ffffff; 
            border: none;
        }
        .btn-primary:hover { background: #333333; }
        .btn-secondary { 
            background: #ffffff; 
            color: #374151; 
            border: 1px solid #d1d5db; 
        }
        .btn-secondary:hover { background: #f3f4f6; }

        @media print {
            .preview-controls { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="preview-controls">
        <button onclick="window.print()" class="btn btn-primary">Print</button>
    </div>
    
    {% include 'curriculum_print.html' %}
</body>
</html>
