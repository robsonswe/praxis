<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Praxis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               display: flex; justify-content: center; align-items: center; height: 100vh;
               background: #f5f5f5; }
        .container { background: white; padding: 40px; border-radius: 12px; 
                     box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 400px; }
        h1 { margin-bottom: 10px; color: #333; font-size: 24px; text-align: center; }
        p { margin-bottom: 25px; color: #666; text-align: center; font-size: 14px; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; 
                border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: #2563eb; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; 
                 border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 500; }
        button:hover { background: #1d4ed8; }
        .error { color: #dc2626; background: #fee2e2; padding: 10px; border-radius: 6px; 
                 font-size: 13px; margin-bottom: 15px; text-align: center; }
        .footer { margin-top: 20px; text-align: center; font-size: 14px; color: #666; }
        .footer a { color: #2563eb; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p>Set up your personal workspace</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/setup">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="Your full name">
            
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="name@example.com">
            
            <button type="submit">Get Started</button>
        </form>

        <div class="footer">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>
</body>
</html>
