{% extends 'base.html' %}

{% block content %}
<div class="interview-page">
    <!-- Top Bar -->
    <div class="interview-topbar">
        <div class="topbar-left">
            <a href="/jobs" class="exit-link" onclick="return confirmExit()">← Exit</a>
            <span class="separator">|</span>
            <span class="question-counter" id="questionCounter">Question 1 of {{ session.questions | length }}</span>
        </div>
        <div class="topbar-center">
            <strong>{{ job.title }}</strong> — {{ job.company }}
        </div>
        <div class="topbar-right">
            <div class="timer-box" id="timerBox">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                <span id="timerDisplay">{{ session.time_per_question // 60 }}:00</span>
            </div>
            <div class="progress-bar-wrapper">
                <div class="progress-bar" id="progressBar" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be rendered by JS -->
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area" id="inputArea">
        <div class="input-wrapper">
            <textarea id="answerInput" placeholder="Type your answer..." rows="2" 
                      onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();submitAnswer();}"></textarea>
            {% if session.response_mode == 'voice' %}
            <button type="button" class="mic-btn" id="micBtn" onclick="toggleMic()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
            </button>
            {% endif %}
            <button type="button" class="send-btn" id="sendBtn" onclick="submitAnswer()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
        </div>
    </div>
</div>

<style>
    .interview-page { display: flex; flex-direction: column; height: 100vh; background: #f8fafc; }

    .interview-topbar { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: #fff; border-bottom: 1px solid #e2e8f0; flex-shrink: 0; gap: 1rem; flex-wrap: wrap; }
    .topbar-left { display: flex; align-items: center; gap: 0.75rem; }
    .exit-link { color: #64748b; text-decoration: none; font-weight: 600; font-size: 0.85rem; }
    .exit-link:hover { color: #2563eb; }
    .separator { color: #cbd5e1; }
    .question-counter { color: #475569; font-size: 0.85rem; font-weight: 600; }
    .topbar-center { color: #1e293b; font-size: 0.9rem; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .timer-box { display: flex; align-items: center; gap: 0.5rem; background: #f1f5f9; border-radius: 8px; padding: 0.4rem 0.8rem; font-family: monospace; font-size: 0.9rem; font-weight: 700; color: #1e293b; }
    .timer-box.warning { color: #ef4444; background: #fef2f2; }
    .progress-bar-wrapper { width: 120px; height: 6px; background: #e2e8f0; border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; background: #2563eb; border-radius: 999px; transition: width 0.3s ease; }

    .chat-area { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; }
    .chat-messages { max-width: 800px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }

    .msg { padding: 1rem 1.25rem; border-radius: 16px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.interviewer { background: #fff; border: 1px solid #e2e8f0; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.candidate { background: #2563eb; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.system { background: #f1f5f9; color: #64748b; align-self: center; text-align: center; font-size: 0.85rem; max-width: 500px; border-radius: 12px; }
    .msg.evaluation { background: #fff; border: 1px solid #e2e8f0; align-self: flex-start; max-width: 90%; border-left: 4px solid #2563eb; }

    .msg-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4rem; color: #94a3b8; }
    .msg.candidate .msg-label { color: rgba(255,255,255,0.7); }
    .msg.evaluation .msg-label { color: #2563eb; }

    .eval-score { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .eval-section { margin-top: 0.75rem; }
    .eval-section-title { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 0.25rem; }
    .eval-list { list-style: none; padding: 0; margin: 0; }
    .eval-list li { font-size: 0.85rem; color: #475569; padding: 0.15rem 0; }
    .eval-list li::before { content: '•'; color: #94a3b8; margin-right: 0.5rem; }

    .thinking-indicator { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.25rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; align-self: flex-start; font-size: 0.85rem; color: #64748b; }
    .thinking-dots span { display: inline-block; width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: blink 1.4s infinite both; }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3; } 40% { opacity: 1; } }

    .input-area { padding: 1rem 1.5rem; background: #fff; border-top: 1px solid #e2e8f0; flex-shrink: 0; }
    .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 0.75rem; align-items: flex-end; }
    .input-wrapper textarea { flex: 1; resize: none; border: 1px solid #cbd5e1; border-radius: 12px; padding: 0.75rem 1rem; font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .input-wrapper textarea:focus { border-color: #2563eb; }
    .input-wrapper textarea:disabled { background: #f1f5f9; color: #94a3b8; }
    .send-btn, .mic-btn { width: 44px; height: 44px; border-radius: 12px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
    .send-btn { background: #2563eb; color: #fff; }
    .send-btn:hover:not(:disabled) { background: #1d4ed8; }
    .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .mic-btn { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
    .mic-btn:hover { background: #e2e8f0; }
    .mic-btn.listening { background: #ef4444; color: #fff; border-color: #ef4444; animation: pulse-red 1s infinite; }
    @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }

    .next-btn { background: #2563eb; color: #fff; border: none; padding: 0.6rem 1.5rem; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 0.75rem; font-size: 0.85rem; transition: background 0.2s; }
    .next-btn:hover { background: #1d4ed8; }
</style>
{% endblock %}

{% block scripts %}
<script>
    const SESSION = {{ session | tojson }};
    const QUESTIONS = SESSION.questions;
    const TIME_LIMIT = SESSION.time_per_question;
    const USER_ID = {{ user_id | tojson }};

    let currentIndex = 0;
    let timerInterval = null;
    let timeRemaining = TIME_LIMIT;
    let timerPaused = false;
    let isProcessing = false;
    let waitingForFollowUp = false;
    let currentFollowUpQuestion = null;

    // STT state
    let recognition = null;
    let isListening = false;

    const chatMessages = document.getElementById('chatMessages');
    const chatArea = document.getElementById('chatArea');
    const answerInput = document.getElementById('answerInput');
    const sendBtn = document.getElementById('sendBtn');

    function scrollToBottom() {
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addMessage(type, content, extra = null) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;

        if (type === 'interviewer') {
            div.innerHTML = `<div class="msg-label">Interviewer</div>${content}`;
        } else if (type === 'candidate') {
            div.innerHTML = `<div class="msg-label">You</div>${content}`;
        } else if (type === 'system') {
            div.innerHTML = content;
        } else if (type === 'evaluation') {
            const score = extra?.score ?? 0;
            const color = score >= 7 ? '#10b981' : score >= 5 ? '#f59e0b' : '#ef4444';
            let html = `<div class="msg-label">AI Evaluation</div>`;
            html += `<div class="eval-score" style="color:${color}">${score}/10</div>`;
            html += `<p style="margin:0 0 0.5rem;color:#475569;font-size:0.9rem;">${extra.evaluation || ''}</p>`;

            if (extra.strengths?.length) {
                html += `<div class="eval-section"><div class="eval-section-title">✓ Strengths</div><ul class="eval-list">${extra.strengths.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
            }
            if (extra.improvements?.length) {
                html += `<div class="eval-section"><div class="eval-section-title">△ To Improve</div><ul class="eval-list">${extra.improvements.map(s => `<li>${s}</li>`).join('')}</ul></div>`;
            }

            div.innerHTML = html;
        }

        chatMessages.appendChild(div);
        scrollToBottom();
        return div;
    }

    function showThinking() {
        const div = document.createElement('div');
        div.className = 'thinking-indicator';
        div.id = 'thinkingIndicator';
        div.innerHTML = `<div class="thinking-dots"><span></span><span></span><span></span></div>`;
        chatMessages.appendChild(div);
        scrollToBottom();
    }

    function hideThinking() {
        const el = document.getElementById('thinkingIndicator');
        if (el) el.remove();
    }

    function updateProgress() {
        const pct = ((currentIndex + 1) / QUESTIONS.length) * 100;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('questionCounter').textContent = `Question ${currentIndex + 1} of ${QUESTIONS.length}`;
    }

    function startTimer() {
        timeRemaining = TIME_LIMIT;
        timerPaused = false;
        updateTimerDisplay();

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (timerPaused) return;
            timeRemaining--;
            updateTimerDisplay();
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                // Auto-submit
                const answer = answerInput.value.trim();
                if (answer) {
                    submitAnswer();
                } else {
                    addMessage('system', '⏰ Time is up! Moving to the next question.');
                    proceedToNext();
                }
            }
        }, 1000);
    }

    function pauseTimer() {
        timerPaused = true;
    }

    function resumeTimer() {
        timerPaused = false;
    }

    function updateTimerDisplay() {
        const mins = Math.floor(timeRemaining / 60);
        const secs = timeRemaining % 60;
        const display = document.getElementById('timerDisplay');
        display.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;

        const box = document.getElementById('timerBox');
        if (timeRemaining <= 30) box.classList.add('warning');
        else box.classList.remove('warning');
    }

    function setInputEnabled(enabled) {
        answerInput.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (enabled) answerInput.focus();
    }

    // --- Interview Flow ---

    function presentQuestion(index) {
        currentIndex = index;
        updateProgress();

        const q = QUESTIONS[index];
        const badge = q.type === 'behavioral' ? '🧠' : '💻';
        addMessage('interviewer', `${badge} ${q.text}`);

        waitingForFollowUp = false;
        currentFollowUpQuestion = null;
        setInputEnabled(true);
        startTimer();
    }

    async function submitAnswer() {
        const answer = answerInput.value.trim();
        if (!answer || isProcessing) return;

        isProcessing = true;
        addMessage('candidate', answer);
        answerInput.value = '';
        setInputEnabled(false);
        pauseTimer();
        showThinking();

        const elapsed = TIME_LIMIT - timeRemaining;

        try {
            if (waitingForFollowUp) {
                // Submit follow-up answer
                const res = await fetch(`/api/mock/${SESSION.id}/follow-up`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question_index: currentIndex,
                        follow_up_answer: answer
                    })
                });
                const evaluation = await res.json();
                hideThinking();
                setTimeout(() => proceedToNext(), 1000);

            } else {
                // Submit main answer
                const res = await fetch(`/api/mock/${SESSION.id}/answer`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question_index: currentIndex,
                        user_answer: answer,
                        time_taken: elapsed
                    })
                });
                const evaluation = await res.json();
                hideThinking();

                if (evaluation.needs_follow_up && evaluation.follow_up_question) {
                    // Show follow-up question
                    waitingForFollowUp = true;
                    currentFollowUpQuestion = evaluation.follow_up_question;
                    setTimeout(() => {
                        addMessage('interviewer', `🔄 ${evaluation.follow_up_question}`);
                        setInputEnabled(true);
                        
                        const halfTime = Math.floor(TIME_LIMIT / 2);
                        if (timeRemaining < halfTime) {
                            timeRemaining = halfTime;
                        }
                        updateTimerDisplay();

                        resumeTimer();
                        isProcessing = false;
                    }, 600);
                    return;
                }

                setTimeout(() => proceedToNext(), 1000);
            }
        } catch (e) {
            hideThinking();
            addMessage('system', `Error: ${e.message}`);
            setInputEnabled(true);
            resumeTimer();
        }

        isProcessing = false;
    }

    function addNextButton() {
        const isLast = currentIndex >= QUESTIONS.length - 1;
        const label = isLast ? '✓ Finish Interview' : 'Next Question →';

        const btn = document.createElement('button');
        btn.className = 'next-btn';
        btn.textContent = label;
        btn.onclick = () => {
            btn.remove();
            proceedToNext();
        };

        chatMessages.appendChild(btn);
        scrollToBottom();
    }

    async function proceedToNext() {
        if (currentIndex >= QUESTIONS.length - 1) {
            // Finish
            setInputEnabled(false);
            if (timerInterval) clearInterval(timerInterval);
            addMessage('system', '⏳ Generating your interview report...');
            showThinking();

            try {
                const res = await fetch(`/api/mock/${SESSION.id}/finish`, { method: 'POST' });
                const result = await res.json();
                hideThinking();
                window.location.href = `/jobs/interview/${SESSION.id}`;
            } catch (e) {
                hideThinking();
                addMessage('system', `Failed to generate report: ${e.message}`);
            }
        } else {
            presentQuestion(currentIndex + 1);
        }
    }

    // --- Voice Input ---
    {% if session.response_mode == 'voice' %}
    function initSTT() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return null;
        const rec = new SpeechRecognition();
        rec.continuous = true;
        rec.interimResults = true;
        rec.lang = '{{ session.language }}';
        rec.onresult = (e) => {
            const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
            answerInput.value = transcript;
        };
        rec.onerror = () => stopMic();
        rec.onend = () => { if (isListening) stopMic(); };
        return rec;
    }

    function toggleMic() {
        if (isListening) stopMic();
        else startMic();
    }

    function startMic() {
        if (!recognition) recognition = initSTT();
        if (!recognition) return;
        try {
            recognition.start();
            isListening = true;
            document.getElementById('micBtn').classList.add('listening');
        } catch(e) {}
    }

    function stopMic() {
        if (recognition) recognition.stop();
        isListening = false;
        const btn = document.getElementById('micBtn');
        if (btn) btn.classList.remove('listening');
    }
    {% endif %}

    function confirmExit() {
        return confirm('Are you sure you want to exit? Your progress will not be saved.');
    }

    // Start the interview
    window.addEventListener('DOMContentLoaded', () => {
        addMessage('system', `Mock Interview Session — ${QUESTIONS.length} questions, ${TIME_LIMIT / 60} min per question`);
        setTimeout(() => {
            const introMsg = SESSION.introduction_message || `Hello! I will be conducting your interview for the {{ job.title }} position today. Let's begin.`;
            addMessage('interviewer', introMsg);
            setTimeout(() => presentQuestion(0), 1500);
        }, 500);
    });
</script>
{% endblock %}
