{% extends 'base.html' %}

{% block content %}
<div class="job-analysis">
    <div class="job-grid">
        <section class="job-panel">
            <div class="job-panel-header">
                <h3>Job posts</h3>
                <button class="job-ghost" id="toggleAddJob" type="button">Add job</button>
            </div>

            <form class="job-form" id="jobForm">
                <div class="job-form-row">
                    <div>
                        <label for="job-title">Role title</label>
                        <input class="job-input" id="job-title" name="title" placeholder="Senior Product Designer" required>
                    </div>
                    <div>
                        <label for="job-company">Company</label>
                        <input class="job-input" id="job-company" name="company" placeholder="Solstice Labs" required>
                    </div>
                </div>
                <div class="job-form-row">
                    <div>
                        <label for="job-location">Location</label>
                        <input class="job-input" id="job-location" name="location" placeholder="Remote, LATAM">
                    </div>
                    <div>
                        <label for="job-type">Type</label>
                        <select class="job-select" id="job-type" name="job_type">
                            <option value="full-time">Full-time</option>
                            <option value="contract">Contract</option>
                            <option value="internship">Internship</option>
                            <option value="freelance">Freelance</option>
                        </select>
                    </div>
                </div>
                <div class="job-form-row">
                    <div>
                        <label for="job-salary">Salary range</label>
                        <input class="job-input" id="job-salary" name="salary" placeholder="$80k-$110k">
                    </div>
                    <div>
                        <label for="job-link">Job link</label>
                        <input class="job-input" id="job-link" name="link" placeholder="https://...">
                    </div>
                </div>
                <div>
                    <label for="job-description">Job description</label>
                    <textarea class="job-textarea" id="job-description" name="description" placeholder="Paste the key responsibilities and requirements"></textarea>
                </div>
                <div>
                    <label for="job-company-description">Company context (optional)</label>
                    <textarea class="job-textarea" id="job-company-description" name="company_description" placeholder="Share team size, mission, or culture notes"></textarea>
                </div>
                <div class="job-form-actions">
                    <button class="job-ghost" id="cancelJob" type="button">Cancel</button>
                    <button class="job-primary" type="submit">Save job</button>
                </div>
            </form>

            <div class="job-list" id="jobList"></div>
            <div class="job-empty" id="jobEmpty">
                <div>No jobs yet. Add your first role to start building analysis placeholders.</div>
                <button class="job-primary" type="button" id="addSample">Add sample job</button>
            </div>
        </section>

        <section class="job-panel">
            <div class="job-panel-header">
                <h3>Analysis</h3>
                <div class="job-status" id="analysisStatus">Not analyzed</div>
            </div>
            <div class="job-analysis-body" id="analysisBody">
                <div class="job-summary">Select a job to see a structured analysis placeholder.</div>
            </div>
        </section>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const jobForm = document.getElementById('jobForm');
        const jobList = document.getElementById('jobList');
        const jobEmpty = document.getElementById('jobEmpty');
        const toggleAddJob = document.getElementById('toggleAddJob');
        const cancelJob = document.getElementById('cancelJob');
        const addSample = document.getElementById('addSample');
        const analysisBody = document.getElementById('analysisBody');
        const analysisStatus = document.getElementById('analysisStatus');

        if (!jobForm || !jobList || !jobEmpty || !toggleAddJob || !cancelJob || !addSample || !analysisBody || !analysisStatus) {
            return;
        }

        let jobs = [];
        let selectedId = null;
        let analysisState = null;

        const sampleJob = {
            title: 'Product Operations Lead',
            company: 'Harborline Studio',
            location: 'Remote, EU',
            job_type: 'full-time',
            salary: '$70k-$95k',
            link: 'https://example.com/jobs/harborline',
            description: 'Own process improvements, partner with design and engineering, and build reporting rhythms.',
            company_description: 'Distributed studio focused on premium creator tools and calm operational cadence.'
        };

        async function fetchJson(url, options = {}) {
            const response = await fetch(url, {
                headers: { 'Content-Type': 'application/json' },
                ...options
            });
            if (!response.ok) {
                const message = await response.text();
                throw new Error(message || 'Request failed');
            }
            return response.json();
        }

        async function loadJobs() {
            try {
                jobs = await fetchJson('/api/jobs');
                renderJobs();
                renderAnalysis();
            } catch (error) {
                console.error('Failed to load jobs', error);
            }
        }

        function renderJobs() {
        jobList.innerHTML = '';
        if (!jobs.length) {
            jobEmpty.style.display = 'block';
            return;
        }
        jobEmpty.style.display = 'none';

        jobs.forEach(job => {
            const card = document.createElement('div');
            card.className = 'job-card' + (job.id === selectedId ? ' active' : '');
            card.innerHTML = `
                <div class="job-card-title">${job.title}</div>
                <div class="job-card-company">${job.company}</div>
                <div class="job-card-meta">
                    ${job.location ? `<span class="job-chip">${job.location}</span>` : ''}
                    ${job.job_type ? `<span class="job-chip">${job.job_type.replace('-', ' ')}</span>` : ''}
                    ${job.salary ? `<span class="job-chip">${job.salary}</span>` : ''}
                </div>
                <div class="job-card-actions">
                    <button class="job-delete" data-id="${job.id}">Remove</button>
                </div>
            `;
            card.addEventListener('click', (event) => {
                if (event.target.classList.contains('job-delete')) return;
                selectedId = job.id;
                analysisState = null;
                renderJobs();
                renderAnalysis();
            });
            card.querySelector('.job-delete').addEventListener('click', (event) => {
                event.stopPropagation();
                deleteJob(job.id);
            });
            jobList.appendChild(card);
        });
    }

        async function deleteJob(id) {
        try {
            await fetchJson(`/api/jobs/${id}`, { method: 'DELETE' });
            jobs = jobs.filter(job => job.id !== id);
            if (selectedId === id) {
                selectedId = null;
                analysisState = null;
            }
            renderJobs();
            renderAnalysis();
        } catch (error) {
            console.error('Failed to delete job', error);
        }
    }

        function renderAnalysis() {
        const job = jobs.find(item => item.id === selectedId);
        if (!job) {
            analysisStatus.textContent = 'Not analyzed';
            analysisBody.innerHTML = '<div class="job-summary">Select a job to see a structured analysis placeholder.</div>';
            return;
        }

        if (!analysisState) {
            analysisStatus.textContent = 'Ready for analysis';
            analysisBody.innerHTML = `
                <div class="job-summary">${job.title} at ${job.company}. Add a quick analysis placeholder so you can iterate later.</div>
                <button class="job-primary" id="runAnalysis" type="button">Generate placeholder analysis</button>
            `;
            document.getElementById('runAnalysis').addEventListener('click', () => {
                analysisState = {
                    overallScore: 67,
                    fit: {
                        technical: 62,
                        cultural: 71,
                        readiness: 58,
                        impact: 72,
                        alignment: 64
                    },
                    signals: [
                        'Strong product operations foundation from recent roles.',
                        'Clear cross-functional experience with design and engineering.',
                        'Consistent process improvement examples.'
                    ],
                    gaps: [
                        'Need clearer evidence of analytics tooling depth.',
                        'Missing leadership scope in team size or budget.'
                    ],
                    nextSteps: [
                        'Tailor resume to highlight operational metrics.',
                        'Prepare one story focused on scaling workflows.',
                        'Draft a 90-day plan outline.'
                    ]
                };
                renderAnalysis();
            });
            return;
        }

        analysisStatus.textContent = 'Placeholder analysis';
        analysisBody.innerHTML = `
            <div class="job-summary">Overall fit score: <strong>${analysisState.overallScore}%</strong>. Placeholder analysis for ${job.title}. This will be replaced once AI scoring is connected.</div>
            <div class="job-bars">
                ${renderBar('Overall fit', analysisState.overallScore)}
                ${renderBar('Technical fit', analysisState.fit.technical)}
                ${renderBar('Cultural fit', analysisState.fit.cultural)}
                ${renderBar('Readiness', analysisState.fit.readiness)}
                ${renderBar('Impact potential', analysisState.fit.impact)}
                ${renderBar('Role alignment', analysisState.fit.alignment)}
            </div>
            <div class="job-insights">
                ${analysisState.signals.map(item => `<div class="job-insight">Signal: ${item}</div>`).join('')}
                ${analysisState.gaps.map(item => `<div class="job-insight">Gap: ${item}</div>`).join('')}
                ${analysisState.nextSteps.map(item => `<div class="job-insight">Next step: ${item}</div>`).join('')}
            </div>
        `;
    }

        function renderBar(label, value) {
        return `
            <div class="job-bar">
                <div class="job-bar-header">
                    <span>${label}</span>
                    <span>${value}%</span>
                </div>
                <div class="job-bar-track">
                    <div class="job-bar-fill" style="width: ${value}%"></div>
                </div>
            </div>
        `;
    }

        toggleAddJob.addEventListener('click', () => {
            jobForm.classList.toggle('active');
        });

        cancelJob.addEventListener('click', () => {
            jobForm.reset();
            jobForm.classList.remove('active');
        });

        addSample.addEventListener('click', async () => {
            try {
                const created = await fetchJson('/api/jobs', {
                    method: 'POST',
                    body: JSON.stringify(sampleJob)
                });
                jobs = [created, ...jobs];
                selectedId = created.id;
                jobForm.classList.remove('active');
                renderJobs();
                renderAnalysis();
            } catch (error) {
                console.error('Failed to add sample job', error);
            }
        });

        jobForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const data = new FormData(jobForm);
            const job = {
                title: data.get('title').trim(),
                company: data.get('company').trim(),
                location: data.get('location').trim(),
                job_type: data.get('job_type'),
                salary: data.get('salary').trim(),
                link: data.get('link').trim(),
                description: data.get('description').trim(),
                company_description: data.get('company_description').trim()
            };
            try {
                const created = await fetchJson('/api/jobs', {
                    method: 'POST',
                    body: JSON.stringify(job)
                });
                jobs.unshift(created);
                selectedId = created.id;
                jobForm.reset();
                jobForm.classList.remove('active');
                renderJobs();
                renderAnalysis();
            } catch (error) {
                console.error('Failed to save job', error);
            }
        });

        loadJobs();
    });
</script>
{% endblock %}
