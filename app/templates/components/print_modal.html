<div id="printModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="printModalTitle">{{ modal_title|default('Preview') }}</h2>
            <button class="modal-close" onclick="closePrintModal()">&times;</button>
        </div>
        <div class="modal-body">
            <iframe id="printModalIframe" src="{{ modal_src|default('') }}" style="width: 100%; height: 600px; border: none;"></iframe>
        </div>
    </div>
</div>

<script>
    function openPrintModal(src, title) {
        if (src) document.getElementById('printModalIframe').src = src;
        if (title) document.getElementById('printModalTitle').innerText = title;
        document.getElementById('printModal').classList.add('active');
    }
    function closePrintModal() {
        document.getElementById('printModal').classList.remove('active');
    }
</script>
